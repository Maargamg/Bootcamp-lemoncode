<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../reseteo.css" />
    <link rel="stylesheet" href="../estilos.css" />
    <title>Crear Actor</title>
</head>
<body>
    <main class="contenedor">
        <div class="contenedor-h1">
           <h1 class="cabecera-h1">Crear Actor</h1>
        </div>
        <div class="card">
            <form class="contenedor-formulario" id="formulario">
              <div class="grupo-formulario">
                <label for="title">Título:</label>
                <input id="title" type="text" name="title" required/>
              </div>
              <div class="grupo-formulario">
                <label for="movies">Movies:</label>
                <input type="text" id="movies" name="movies" required />
               </div>
               <div class="grupo-formulario">
                <label for="bio">Biografia:</label>
                <textarea
                id="bio"
                name="bio"
                rows="4"
                required
                ></textarea>
               </div>
                <div class="grupo-formulario">
                    <label for="cover_url">Portada:</label>
                    <input type="text" id="cover_url" name="cover_url" required/>
                </div>
                <button type="submit">Crear Actor</button>
            </form>
        </div>
    </main>
</body>
<script type="module" src="./actores-crear.ts"></script>
</html>
